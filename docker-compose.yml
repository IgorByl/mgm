services:
  mongo:
    image: mongo:7
    container_name: mgm-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:7
    container_name: mgm-mongo-init
    depends_on:
      - mongo
    entrypoint:
      [
        "bash",
        "-c",
        "sleep 5 && mongosh --host mongo:27017 --eval 'rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"localhost:27017\"}]})'"
      ]
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: mgm-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: mgm-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: mgm-user-service
    environment:
      - PORT=${USER_SERVICE_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - MONGO_URI=${MONGO_URI}
    depends_on:
      - mongo
      - mongo-init
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"

  user-publication-service:
    build:
      context: .
      dockerfile: services/user-publication-service/Dockerfile
    container_name: mgm-user-publication-service
    environment:
      - PORT=${USER_PUBLICATION_SERVICE_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - MONGO_URI=${MONGO_URI}
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - PUBLISH_BATCH_SIZE=${PUBLISH_BATCH_SIZE}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS}
      - MAX_RETRIES=${MAX_RETRIES}
    depends_on:
      - mongo
      - mongo-init
      - kafka
    ports:
      - "${USER_PUBLICATION_SERVICE_PORT}:${USER_PUBLICATION_SERVICE_PORT}"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: mgm-notification-service
    environment:
      - PORT=${NOTIFICATION_SERVICE_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - KAFKA_GROUP_ID=${KAFKA_GROUP_ID}
    depends_on:
      - kafka
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:${NOTIFICATION_SERVICE_PORT}"
